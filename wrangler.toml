name = "theairuntime"
main = "src/worker.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"

# "Ask the Library" uses Cloudflare Workers AI. Until this binding is enabled,
# /api/ask still returns the matched reads, just without a generated answer.
# Uncomment to turn on AI answers (no API key needed, Workers AI is native):
# [ai]
# binding = "AI"

# Student cohort waitlist storage. Until this is bound, /api/waitlist returns
# 503 and the cohort form falls back to PUBLIC_COHORT_JOIN_URL. To enable:
#   npx wrangler kv namespace create WAITLIST
# then paste the returned id below and uncomment.
# [[kv_namespaces]]
# binding = "WAITLIST"
# id = "<your-kv-namespace-id>"
