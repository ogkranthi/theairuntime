name = "theairuntime"
main = "src/worker.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
# Run the Worker before static-asset serving so the host-routing redirects in
# src/worker.ts actually fire. Without this, Cloudflare serves a matching file
# (e.g. dist/index.html for "/") before the Worker runs, so the lab-host root
# redirect never executes. The Worker falls through to env.ASSETS.fetch() for
# everything it does not redirect, so normal asset serving is unchanged.
run_worker_first = true

# "Ask the Library" uses Cloudflare Workers AI. Until this binding is enabled,
# /api/ask still returns the matched reads, just without a generated answer.
# Uncomment to turn on AI answers (no API key needed, Workers AI is native):
# [ai]
# binding = "AI"

# Student cohort waitlist storage. Until this is bound, /api/waitlist returns
# 503 and the cohort form falls back to PUBLIC_COHORT_JOIN_URL. To enable:
#   npx wrangler kv namespace create WAITLIST
# then paste the returned id below and uncomment.
# [[kv_namespaces]]
# binding = "WAITLIST"
# id = "<your-kv-namespace-id>"

# Field Lab intake review queue. Until this is bound, /api/intake returns 503
# and the intake page falls back to the per-branch PUBLIC_*_INTAKE_URL env
# vars. The problem branch writes a Field Brief draft (status Draft); build and
# partner branches write interest records. Nothing here is ever auto-published.
#   npx wrangler kv namespace create INTAKE
# then paste the returned id below and uncomment.
# [[kv_namespaces]]
# binding = "INTAKE"
# id = "<your-kv-namespace-id>"
